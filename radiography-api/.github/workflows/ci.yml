name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  security-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety

    - name: Check dependencies with safety
      run: safety check --json
      continue-on-error: true

    - name: Check code security with bandit
      run: bandit -r app -f json -o bandit-report.json
      continue-on-error: true

  build:
    needs: [security-check]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validate database migrations
      run: |
        # This checks that Alembic migrations are valid
        alembic branches
      continue-on-error: true

    - name: Build API
      run: |
        echo "API build validation completed"
        echo "Ready for deployment"

  notify:
    needs: [security-check, build]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Check job status
      run: |
        if [ "${{ needs.security-check.result }}" = "failure" ]; then
          echo "Pipeline has failures"
          exit 1
        fi
        echo "Pipeline completed successfully"
